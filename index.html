<!DOCTYPE html>
<html>
<head>
    <title>Rachel Notes</title>


</ul>
    <style>
        body {
            max-width: 800px;
            margin: auto;
            padding: 40px;
            font-family: Georgia, serif;
            line-height: 1.8;
            background-color: #ffffff;
            transition: background-color 0.3s;
        }

        .toolbar {
            margin-bottom: 20px;
        }

        input[type="color"] {
            width: 50px;
            height: 35px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <label>Choose page color:</label>
        <input type="color" id="colorPicker" value="#ffffff">
    </div>

    <h1>Rachel Notes</h1>

    <p>Welcome to my public academic notebook.</p>

    <script>
        const picker = document.getElementById("colorPicker");

        picker.addEventListener("input", function () {
            document.body.style.backgroundColor = this.value;
        });
    </script>
<textarea id="note" rows="10" cols="50"></textarea>

<button onclick="saveNote()">
Save Note
</button>

<script>
const saved = localStorage.getItem("note");

if(saved){
    document.getElementById("note").value = saved;
}

function saveNote(){
    const text =
        document.getElementById("note").value;

    localStorage.setItem("note", text);

    alert("Saved!");
}
</script>

        <input
    type="text"
    id="searchBox"
    placeholder="Search notes..."
>

<ul id="noteList">
    <li>Environmental Law</li>
    <li>Competition Law</li>
    <li>DALF C1 Vocabulary</li>
    <li>Jurisprudence</li>
</body>
</html>
