<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RACHELAND</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h2>Notebook</h2>

  <div class="cat active" data-cat="French">French</div>
  <div class="cat" data-cat="English">English</div>
  <div class="cat" data-cat="Law">Law</div>
  <div class="cat" data-cat="Diary">Diary</div>

  <hr>

  <input id="search" placeholder="Search notes...">

  <button id="settingsBtn">⚙ Settings</button>
</div>

<!-- MAIN -->
<div id="main">
  <div class="header">
    <h1 id="title">Notes</h1>
    <h3 id="currentCat">French</h3>
  </div>

  <div class="editor">
    <input id="noteTitle" placeholder="Title">
    <textarea id="noteContent" placeholder="Write something..."></textarea>
    <input type="file" id="file">
    <button id="createBtn">+ Create Note</button>
  </div>

  <div id="notes"></div>
</div>

<!-- SETTINGS MODAL -->
<div id="modal">
  <div class="modalBox">
    <h3>Settings</h3>
    <p>Theme Color</p>
    <input type="color" id="colorPicker">

    <button id="closeModal">Close</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
