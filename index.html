<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Notes</title>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
transition:0.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

#settings{
display:none;
padding:15px;
border:1px solid #ddd;
margin-top:10px;
border-radius:8px;
}

.note{
padding:10px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

</style>

</head>

<body>

<header>

<h1>📚 My Notes</h1>

<button onclick="toggleSettings()">
⚙️
</button>

</header>

<div id="settings">

<h3>Page Color</h3>

<input type="color" id="colorPicker">

</div>

<h2>Add Note</h2>

<input
type="text"
id="title"
placeholder="Title"
>

<select id="category">

<option>Law</option>
<option>French</option>
<option>Diary</option>
<option>Study</option>

</select>

<textarea
id="content"
placeholder="Write something..."
style="width:100%;height:120px;"
></textarea>

<br><br>

<button onclick="saveNote()">
Save Note
</button>

<hr>

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="renderNotes()"
>

<div id="notes"></div>

<script>

function toggleSettings(){

const panel =
document.getElementById("settings");

panel.style.display =
panel.style.display==="block"
? "none"
: "block";

}

const picker =
document.getElementById("colorPicker");

picker.addEventListener("input",()=>{

document.body.style.backgroundColor =
picker.value;

localStorage.setItem(
"theme",
picker.value
);

});

const savedTheme =
localStorage.getItem("theme");

if(savedTheme){

document.body.style.backgroundColor =
savedTheme;

}

function saveNote(){

const title =
document.getElementById("title").value;

const category =
document.getElementById("category").value;

const content =
document.getElementById("content").value;

let notes =
JSON.parse(
localStorage.getItem("notes")
) || [];

notes.push({
title,
category,
content
});

localStorage.setItem(
"notes",
JSON.stringify(notes)
);

renderNotes();

}

function renderNotes(){

const notesDiv =
document.getElementById("notes");

const keyword =
document.getElementById("search")
.value.toLowerCase();

let notes =
JSON.parse(
localStorage.getItem("notes")
) || [];

notesDiv.innerHTML="";

notes
.filter(note =>
note.title.toLowerCase().includes(keyword)
||
note.content.toLowerCase().includes(keyword)
)
.forEach(note => {

notesDiv.innerHTML += `
<div class="note">
<h3>${note.title}</h3>
<p><b>${note.category}</b></p>
<p>${note.content}</p>
</div>
`;

});

}

renderNotes();

</script>

</body>
</html>
