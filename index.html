<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Notes</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>📚 My Notes & Diary</h1>

   <header>

    <h1>📚 My Notes & Diary</h1>

    <div class="settings-container">

        <button id="settingBtn">
            ⚙️
        </button>

        <div id="settingsPanel">

            <h4>Page Color</h4>

            <input type="color" id="themePicker">

        </div>

    </div>

</header>

<section class="upload-section">

    <input type="file" id="fileInput">

    <select id="category">

        <option>Diary</option>
        <option>Law</option>
        <option>French</option>
        <option>Study</option>

    </select>

    <button onclick="saveNote()">
        Save
    </button>

</section>

<section>

    <input
        type="text"
        id="searchBox"
        placeholder="Search notes..."
    >

</section>

<ul id="noteList">

</ul>

<script src="script.js"></script>

</body>
</html>
