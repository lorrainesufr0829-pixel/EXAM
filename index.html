<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RACHELAND</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h2>Notebook</h2>

  <div class="cat" onclick="setCat('French')">French</div>
  <div class="cat" onclick="setCat('English')">English</div>
  <div class="cat" onclick="setCat('Law')">Law</div>
  <div class="cat" onclick="setCat('Diary')">Diary</div>

  <hr>

  <input id="search" placeholder="Search..." oninput="loadNotes()">

<button onclick="openSettings()"> 🎨🎨Theme Color </button>

<div id="modal" class="modal">
  <div class="modalBox">
    <h3>Settings</h3>

    <p>Theme Color</p>
    <input type="color" onchange="setTheme(this.value)">

    <br><br>
    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <h1 id="title">Notes</h1>
  <h3 id="currentCat"></h3>

  <input id="noteTitle" placeholder="Title"><br>
  <textarea id="noteContent" placeholder="Content"></textarea><br>
  <input type="file" id="file"><br>

  <button onclick="createNote()">Create</button>

  <div id="notes"></div>
</div>

<!-- SETTINGS -->
<div id="modal">
  <div class="modalBox">
    <h3>Settings</h3>

    <p>Theme</p>
    <input type="color" onchange="setTheme(this.value)">

    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
