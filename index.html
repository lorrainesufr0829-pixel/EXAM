<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rachel Land</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="secretColorBtn">🎨</button>

    <div class="diary-container">
        <h1>Rachel Land</h1>
        
        <div class="note-form">
            <input type="text" id="noteTitle" placeholder="Note Title...">
            
            <select id="noteCategory">
                <option value="French learning">🥐 FR </option>
                <option value="English learning">😶‍🌫️ EN </option>
                <option value="Law">💼 Law </option>
                <option value="Ideas">💡 Ideas</option>
            </select>
            
            <textarea id="noteBody" placeholder="Write your thoughts here..."></textarea>
            <button onclick="addNote()">Save Note</button>
        </div>

        <div id="notesContainer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
