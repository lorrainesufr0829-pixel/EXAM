```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Notes & Diary</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#f7f5f2;
--sidebar:#ffffff;
--card:#ffffff;
--text:#222;
--border:#e8e8e8;
--accent:#4f46e5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:var(--sidebar);
border-right:1px solid var(--border);
padding:24px;
display:flex;
flex-direction:column;
}

.logo{
font-size:24px;
font-weight:700;
margin-bottom:30px;
}

.category{
padding:12px 14px;
margin-bottom:8px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.category:hover{
background:#f0f0f0;
}

.category.active{
background:rgba(79,70,229,.1);
color:var(--accent);
font-weight:600;
}

.new-note-btn{
margin-top:auto;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
color:white;
font-size:15px;
cursor:pointer;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topbar{
height:80px;
padding:0 30px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid var(--border);
background:white;
}

.search{
width:420px;
max-width:100%;
padding:12px 16px;
border-radius:12px;
border:1px solid var(--border);
font-size:15px;
outline:none;
}

.settings-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:18px;
background:#f4f4f4;
}

/* SETTINGS */

.settings-panel{
position:absolute;
top:85px;
right:25px;
background:white;
width:240px;
padding:18px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
display:none;
z-index:100;
}

.settings-panel h4{
margin-bottom:12px;
}

.theme-btn{
width:100%;
padding:10px;
margin-bottom:8px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* NOTES */

.notes{
padding:25px;
overflow-y:auto;
}

.note-card{
background:var(--card);
border-radius:18px;
padding:20px;
margin-bottom:16px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
transition:.2s;
}

.note-card:hover{
transform:translateY(-3px);
}

.note-category{
font-size:12px;
font-weight:600;
color:var(--accent);
margin-bottom:8px;
text-transform:uppercase;
}

.note-title{
font-size:20px;
font-weight:700;
margin-bottom:8px;
}

.note-content{
line-height:1.6;
opacity:.85;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
width:700px;
max-width:90%;
padding:30px;
border-radius:20px;
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content input,
.modal-content select,
.modal-content textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:12px;
font-family:inherit;
}

.modal-content textarea{
height:180px;
resize:none;
}

.save-btn{
background:var(--accent);
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
}

/* DARK */

.dark{
--bg:#151515;
--sidebar:#1e1e1e;
--card:#242424;
--text:#f5f5f5;
--border:#333;
}

/* MOBILE */

@media(max-width:768px){

.sidebar{
display:none;
}

.search{
width:100%;
}

}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<div class="logo">
📚 My Notes
</div>

<div class="category active">
All Notes
</div>

<div class="category">
⚖️ Law
</div>

<div class="category">
🇫🇷 French
</div>

<div class="category">
📖 Diary
</div>

<div class="category">
🎓 Exams
</div>

<button class="new-note-btn" onclick="openModal()">
+ New Note
</button>

</div>

<div class="main">

<div class="topbar">

<input
class="search"
id="search"
placeholder="Search notes..."
onkeyup="renderNotes()"
>

<button
class="settings-btn"
onclick="toggleSettings()"
>
⚙️
</button>

</div>

<div class="settings-panel" id="settings">

<h4>Theme</h4>

<button class="theme-btn" onclick="setTheme('cream')">
Cream
</button>

<button class="theme-btn" onclick="setTheme('sage')">
Sage
</button>

<button class="theme-btn" onclick="setTheme('lavender')">
Lavender
</button>

<button class="theme-btn" onclick="setTheme('dark')">
Dark
</button>

</div>

<div class="notes" id="notes">

</div>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<h2>New Note</h2>

<input
id="title"
placeholder="Title"
>

<select id="category">

<option>Law</option>
<option>French</option>
<option>Diary</option>
<option>Exams</option>

</select>

<textarea
id="content"
placeholder="Write your note..."
></textarea>

<input type="file">

<button
class="save-btn"
onclick="saveNote()"
>
Save Note
</button>

</div>

</div>

<script>

let notes =
JSON.parse(
localStorage.getItem("notes")
) || [

{
title:"Welcome",
category:"Diary",
content:"This is your first note."
}

];

function saveStorage(){

localStorage.setItem(
"notes",
JSON.stringify(notes)
);

}

function renderNotes(){

const container =
document.getElementById("notes");

const keyword =
document.getElementById("search")
.value
.toLowerCase();

container.innerHTML="";

notes
.filter(n=>

n.title.toLowerCase().includes(keyword)
||
n.content.toLowerCase().includes(keyword)

)
.forEach(note=>{

container.innerHTML += `

<div class="note-card">

<div class="note-category">
${note.category}
</div>

<div class="note-title">
${note.title}
</div>

<div class="note-content">
${note.content}
</div>

</div>

`;

});

}

function openModal(){

document.getElementById("modal")
.style.display="flex";

}

window.onclick=function(e){

if(e.target.id==="modal"){

document.getElementById("modal")
.style.display="none";

}

}

function saveNote(){

const title =
document.getElementById("title")
.value;

const category =
document.getElementById("category")
.value;

const content =
document.getElementById("content")
.value;

if(!title) return;

notes.unshift({

title,
category,
content

});

saveStorage();

renderNotes();

document.getElementById("modal")
.style.display="none";

document.getElementById("title")
.value="";

document.getElementById("content")
.value="";

}

function toggleSettings(){

const panel =
document.getElementById("settings");

panel.style.display =
panel.style.display==="block"
? "none"
: "block";

}

function setTheme(theme){

document.body.classList.remove("dark");

if(theme==="dark"){

document.body.classList.add("dark");

}

if(theme==="sage"){

document.documentElement.style.setProperty(
'--bg','#edf4ee'
);

}

if(theme==="lavender"){

document.documentElement.style.setProperty(
'--bg','#f3f0ff'
);

}

if(theme==="cream"){

document.documentElement.style.setProperty(
'--bg','#f7f5f2'
);

}

localStorage.setItem(
"theme",
theme
);

}

const savedTheme =
localStorage.getItem("theme");

if(savedTheme){

setTheme(savedTheme);

}

renderNotes();

</script>

</body>
</html>
```
